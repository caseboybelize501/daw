services:
  # Main Web Service - LLM.DAW API
  - type: web
    name: llm-daw-api
    env: docker
    region: oregon
    plan: starter
    dockerfilePath: ./Dockerfile
    dockerContext: .
    branch: main
    autoDeploy: true
    healthCheckPath: /health
    envVars:
      - key: PYTHONPATH
        value: /app
      - key: RENDER
        value: "true"
    disk:
      name: models-data
      mountPath: /app/models
      sizeGB: 5

  # Redis - Task Queue & Cache
  - type: redis
    name: llm-daw-redis
    ipAllowList: []
    maxmemoryPolicy: allkeys-lru
    plan: starter

  # PostgreSQL - Memory Storage
  - type: pserv
    name: llm-daw-db
    env: docker
    region: oregon
    plan: starter
    dockerfilePath: ./docker/postgres/Dockerfile
    database:
      name: daw_memory
      user: daw_user
    envVars:
      - key: POSTGRES_DB
        value: daw_memory
      - key: POSTGRES_USER
        value: daw_user
      - key: POSTGRES_PASSWORD
        generateValue: true

  # Neo4j - Signal Chain Graph (Optional - requires custom Docker)
